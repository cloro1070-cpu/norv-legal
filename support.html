<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support — NORV</title>
<meta name="description" content="Get help with NORV. Contact support.">
<style>
  :root {
    --black: #020202;
    --lime: #C8FF00;
    --ink: #EDEDED;
    --muted: #8A8A85;
    --line: #1C1C1A;
    --card: #0A0A09;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--black);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.7;
    display: flex;
    flex-direction: column;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .brand svg { display: block; }
  .brand-name {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--lime);
    margin: 0 0 14px;
  }
  h1 {
    font-size: clamp(34px, 7vw, 52px);
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 22px;
    color: #fff;
  }
  p {
    margin: 0 0 18px;
    color: #CFCFCB;
  }
  .lede { font-size: 19px; }
  a {
    color: var(--lime);
    text-decoration: none;
    border-bottom: 1px solid rgba(200, 255, 0, 0.3);
    transition: border-color 0.15s ease;
    word-break: break-word;
  }
  a:hover { border-bottom-color: var(--lime); }
  .contact-card {
    margin-top: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 28px;
  }
  .contact-card .label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .contact-card .mail { font-size: 19px; font-weight: 700; }
  .contact-card .mail a { color: var(--lime); }
  .note { font-size: 15px; color: var(--muted); margin-top: 18px; }
  footer {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  footer .tag {
    color: var(--lime);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 11px;
  }
  footer a { color: var(--muted); border-bottom-color: rgba(138,138,133,0.3); }
  @media (max-width: 520px) {
    body { font-size: 16px; }
    .wrap { padding: 48px 20px; justify-content: flex-start; }
  }
  @media (prefers-reduced-motion: reduce) { a { transition: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <polygon points="13,3 24,23 2,23" fill="#C8FF00"/>
      </svg>
      <span class="brand-name">NORV</span>
    </div>

    <p class="eyebrow">Support</p>
    <h1>Need a hand?</h1>
    <p class="lede">Questions, bug reports, billing, or anything else about NORV &mdash; reach out and we&rsquo;ll get back to you.</p>

    <div class="contact-card">
      <div class="label">Email us</div>
      <div class="mail"><a href="mailto:contact@studiosharl.com">contact@studiosharl.com</a></div>
    </div>

    <p class="note">We read every message and aim to reply within a few business days.</p>
  </div>

  <footer>
    <span>&copy; 2026 NORV</span>
    <span><a href="index.html">Privacy Policy</a></span>
    <span class="tag">Become the proof</span>
  </footer>
</body>
</html>
